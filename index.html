<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leadership Score Cards</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent !important;
      background-color: transparent !important;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body { display: block; padding: 0; margin: 0; }

    .cards-wrapper {
      display: flex;
      gap: 10px;
      flex-wrap: nowrap;
      width: 100%;
      padding: 10px 0;
      margin: 0;
    }

    .card {
      flex: 1 1 0;
      min-width: 0;
      border-radius: 10px;
      padding: 16px 18px 14px;
      position: relative;
      border: 1px solid #e8e8e4;
    }

    .card-label {
      font-size: 13px;
      color: #6b6b6b;
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 0.01em;
    }

    .card-score-row {
      display: flex;
      align-items: baseline;
      gap: 2px;
    }

    .card-score {
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
    }

    .card-unit {
      font-size: 18px;
      font-weight: 600;
      color: #9b9b9b;
    }

    .card-dot {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 11px;
      height: 11px;
      border-radius: 50%;
    }

    .card--inner  { background: #edf0f7; }
    .card--inner  .card-score { color: #2d5be3; }
    .card--inner  .card-dot   { background: #2d5be3; }

    .card--shared { background: #f7f5ee; }
    .card--shared .card-score { color: #c47c00; }
    .card--shared .card-dot   { background: #c47c00; }

    .card--owned  { background: #f0f7f0; }
    .card--owned  .card-score { color: #2a7a3b; }
    .card--owned  .card-dot   { background: #2a7a3b; }

    .state-msg {
      text-align: center;
      color: #6b6b6b;
      font-size: 14px;
      padding: 24px;
    }

    .skeleton .card-score {
      display: inline-block;
      width: 60px;
      height: 36px;
      background: #ddd;
      border-radius: 6px;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body>

<div class="cards-wrapper" id="cards">
  <div class="card card--inner skeleton">
    <div class="card-label">Inner</div>
    <div class="card-score-row"><span class="card-score"></span></div>
  </div>
  <div class="card card--shared skeleton">
    <div class="card-label">Shared</div>
    <div class="card-score-row"><span class="card-score"></span></div>
  </div>
  <div class="card card--owned skeleton">
    <div class="card-label">Owned</div>
    <div class="card-score-row"><span class="card-score"></span></div>
  </div>
</div>

<script>
  const POLL_INTERVAL = 30000;
  let lastSnapshot = null;

  const domains = [
    { key: "inner",  label: "Inner",  cls: "card--inner",  max: 70 },
    { key: "shared", label: "Shared", cls: "card--shared", max: 50 },
    { key: "owned",  label: "Owned",  cls: "card--owned",  max: 50 },
  ];

  function snapshot(data) {
    return domains.map(d => data[d.key].score).join(",");
  }

  function renderCards(data) {
    const container = document.getElementById("cards");
    container.innerHTML = domains.map(d => {
      const { score } = data[d.key];
      const pct = score != null ? Math.round((score / d.max) * 100) : null;
      return `
        <div class="card ${d.cls}">
          <div class="card-dot"></div>
          <div class="card-label">${d.label}</div>
          <div class="card-score-row">
            <span class="card-score">${pct ?? "—"}</span>
            <span class="card-unit">${pct != null ? "%" : ""}</span>
          </div>
        </div>
      `;
    }).join("");
  }

  async function loadScores() {
    const container = document.getElementById("cards");
    try {
      const res = await fetch("/api/scores");
      const data = await res.json();

      if (!data.found) {
        container.innerHTML = '<p class="state-msg">No pulse entries yet. Complete your first Monthly Pulse to see your scores here.</p>';
        return;
      }

      const current = snapshot(data);
      if (current !== lastSnapshot) {
        renderCards(data);
        lastSnapshot = current;
      }
    } catch (err) {
      if (!lastSnapshot) {
        container.innerHTML = `<p class="state-msg">Could not load scores. ${err.message}</p>`;
      }
    }
  }

  loadScores();
  setInterval(loadScores, POLL_INTERVAL);
</script>

</body>
</html>
