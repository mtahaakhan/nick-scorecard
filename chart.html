<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domain Scores Chart</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent !important;
      width: 100%;
      height: 100%;
    }

    #wrap {
      width: 100%;
      padding: 10px 4px 8px;
    }

    .chart-container {
      width: 100%;
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid #e8e8e4;
      padding: 18px 16px 14px;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .chart-title {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .chart-legend {
      display: flex;
      gap: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #6b6b6b;
      font-weight: 500;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .state-msg {
      text-align: center;
      color: #6b6b6b;
      font-size: 13px;
      padding: 40px 24px;
    }

    #tooltip {
      position: fixed;
      background: #fff;
      border: 1px solid #e8e8e4;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      pointer-events: none;
      display: none;
      z-index: 999;
    }

    .tt-label { font-weight: 600; color: #1a1a1a; margin-bottom: 6px; }

    .tt-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
      color: #444;
    }

    .tt-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div id="wrap">
  <div class="chart-container" id="container">
    <p class="state-msg">Loading...</p>
  </div>
</div>
<div id="tooltip"></div>

<script>
const COLOURS = { inner: "#2d5be3", shared: "#c47c00", owned: "#2a7a3b" };
const MAXES   = { inner: 70, shared: 50, owned: 50 };
const DOMAINS = ["inner", "shared", "owned"];
const LABELS  = { inner: "Inner", shared: "Shared", owned: "Owned" };
const POLL    = 30000;

const PAD = { top: 10, right: 16, bottom: 30, left: 38 };
const Y_MIN = 0, Y_MAX = 100;

let lastSnap = null;
let currentEntries = null;

function formatMonth(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-GB", { month: "short", year: "2-digit" });
}

function renderEmpty(msg) {
  document.getElementById("container").innerHTML = `<p class="state-msg">${msg}</p>`;
}

function renderChart(entries) {
  const container = document.getElementById("container");

  container.innerHTML = `
    <div class="chart-header">
      <span class="chart-title">Domain Scores Over Time</span>
      <div class="chart-legend">
        ${DOMAINS.map(k => `
          <div class="legend-item">
            <span class="legend-dot" style="background:${COLOURS[k]}"></span>
            ${LABELS[k]}
          </div>`).join("")}
      </div>
    </div>
    <div style="position:relative">
      <svg id="chart" style="width:100%;display:block" height="200"></svg>
    </div>
  `;

  drawChart(entries);
}

function drawChart(entries) {
  const svg = document.getElementById("chart");
  if (!svg) return;

  const W = svg.getBoundingClientRect().width || 600;
  const H = 200;
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top  - PAD.bottom;
  const n = entries.length;

  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.innerHTML = "";

  const xPos = i => PAD.left + (n === 1 ? chartW / 2 : i * chartW / (n - 1));
  const yPos = v => PAD.top + chartH - (v - Y_MIN) / (Y_MAX - Y_MIN) * chartH;

  // Grid lines at 0, 20, 40, 60, 80, 100%
  for (let v = Y_MIN; v <= Y_MAX; v += 20) {
    const y = yPos(v);
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", PAD.left); line.setAttribute("x2", PAD.left + chartW);
    line.setAttribute("y1", y); line.setAttribute("y2", y);
    line.setAttribute("stroke", "#f0f0ee");
    line.setAttribute("stroke-dasharray", "3 3");
    svg.appendChild(line);

    const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
    txt.setAttribute("x", PAD.left - 5);
    txt.setAttribute("y", y + 3);
    txt.setAttribute("text-anchor", "end");
    txt.setAttribute("font-size", "10");
    txt.setAttribute("fill", "#9b9b9b");
    txt.setAttribute("font-family", "-apple-system, sans-serif");
    txt.textContent = v + "%";
    svg.appendChild(txt);
  }

  // X-axis labels
  entries.forEach((e, i) => {
    const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
    txt.setAttribute("x", xPos(i));
    txt.setAttribute("y", PAD.top + chartH + 18);
    txt.setAttribute("text-anchor", "middle");
    txt.setAttribute("font-size", "10");
    txt.setAttribute("fill", "#9b9b9b");
    txt.setAttribute("font-family", "-apple-system, sans-serif");
    txt.textContent = formatMonth(e.date);
    svg.appendChild(txt);
  });

  // Lines + dots (converted to %)
  DOMAINS.forEach(key => {
    const color = COLOURS[key];
    const toPct = v => v != null ? Math.round((v / MAXES[key]) * 100) : null;
    const points = entries.map((e, i) => `${xPos(i)},${yPos(toPct(e[key]) ?? 0)}`).join(" ");
    const pl = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
    pl.setAttribute("points", points);
    pl.setAttribute("fill", "none");
    pl.setAttribute("stroke", color);
    pl.setAttribute("stroke-width", "2");
    pl.setAttribute("stroke-linejoin", "round");
    pl.setAttribute("stroke-linecap", "round");
    svg.appendChild(pl);

    entries.forEach((e, i) => {
      if (e[key] == null) return;
      const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      circle.setAttribute("cx", xPos(i));
      circle.setAttribute("cy", yPos(toPct(e[key])));
      circle.setAttribute("r", "3.5");
      circle.setAttribute("fill", color);
      svg.appendChild(circle);
    });
  });

  // Hover hit areas
  const tooltip = document.getElementById("tooltip");
  const xStep = n > 1 ? chartW / (n - 1) : chartW;

  entries.forEach((e, i) => {
    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    rect.setAttribute("x", i === 0 ? 0 : xPos(i) - xStep / 2);
    rect.setAttribute("y", 0);
    rect.setAttribute("width", xStep);
    rect.setAttribute("height", H);
    rect.setAttribute("fill", "transparent");

    rect.addEventListener("mouseenter", (ev) => {
      tooltip.innerHTML = `
        <div class="tt-label">${formatMonth(e.date)}</div>
        ${DOMAINS.map(k => e[k] != null ? `
          <div class="tt-row">
            <span class="tt-dot" style="background:${COLOURS[k]}"></span>
            ${LABELS[k]}: <strong>${Math.round((e[k] / MAXES[k]) * 100)}%</strong>
          </div>` : "").join("")}
      `;
      tooltip.style.display = "block";
      tooltip.style.left = (ev.clientX + 12) + "px";
      tooltip.style.top  = (ev.clientY - 10) + "px";
    });

    rect.addEventListener("mousemove", (ev) => {
      tooltip.style.left = (ev.clientX + 12) + "px";
      tooltip.style.top  = (ev.clientY - 10) + "px";
    });

    rect.addEventListener("mouseleave", () => {
      tooltip.style.display = "none";
    });

    svg.appendChild(rect);
  });
}

async function load() {
  try {
    const res  = await fetch("/api/history");
    const data = await res.json();

    if (!data.found || data.entries.length === 0) {
      if (!lastSnap) renderEmpty("No pulse entries yet. Complete your first Monthly Pulse to see your trends here.");
      return;
    }

    if (data.entries.length === 1) {
      if (!lastSnap) renderEmpty("Complete a second Monthly Pulse to start seeing your trend lines.");
      return;
    }

    const snap = data.entries.map(e => `${e.date}:${e.inner}:${e.shared}:${e.owned}`).join("|");
    if (snap === lastSnap) return;

    lastSnap = snap;
    currentEntries = data.entries;
    renderChart(data.entries);

  } catch (err) {
    if (!lastSnap) renderEmpty(`Could not load chart data. ${err.message}`);
  }
}

load();
setInterval(load, POLL);
window.addEventListener("resize", () => {
  if (currentEntries) drawChart(currentEntries);
});
</script>
</body>
</html>
